<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- ears -->
  <circle cx="58" cy="68" r="22" fill="url(#faceGrad)"/>
  <circle cx="142" cy="68" r="22" fill="url(#faceGrad)"/>
  <!-- face -->
  <circle cx="100" cy="112" r="74" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  <!-- eyes -->
  <ellipse cx="76" cy="102" rx="8" ry="12" fill="#ffffff"/>
  <ellipse cx="124" cy="102" rx="8" ry="12" fill="#ffffff"/>
  <!-- sparkle in eyes -->
  <circle cx="78" cy="98" r="3" fill="#c7d2fe"/>
  <circle cx="126" cy="98" r="3" fill="#c7d2fe"/>
  <!-- blush -->
  <ellipse cx="64" cy="124" rx="10" ry="6" fill="#fda4af" opacity="0.7"/>
  <ellipse cx="136" cy="124" rx="10" ry="6" fill="#fda4af" opacity="0.7"/>
  <!-- smile -->
  <path d="M 88 132 Q 100 142 112 132" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>